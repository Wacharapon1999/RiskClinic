<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Clinic - Booking Link Updated</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@700;800&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Figtree', 'Kanit', sans-serif;
    background-color: #ffffff; /* พื้นหลังขาวสะอาดตา */
  }

  .clinic-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 20px;
    display: flex;
    align-items: center;
    gap: 60px;
  }

  /* --- ฝั่งซ้าย: เนื้อหาและขั้นตอน --- */
  .text-side {
    flex: 1;
  }

  .header-box {
    border-left: 6px solid #007947;
    padding-left: 25px;
    margin-bottom: 40px;
  }

  .main-title {
    font-size: 48px;
    font-weight: 800;
    color: #007947;
    margin: 0;
    line-height: 1;
  }

  .sub-title {
    font-size: 24px;
    font-weight: 400;
    color: #333;
    margin: 10px 0 0 0;
  }

  .steps-list {
    position: relative;
    padding-left: 40px;
    margin-bottom: 40px;
  }

  .steps-list::before {
    content: "";
    position: absolute;
    left: 14px;
    top: 10px;
    bottom: 10px;
    width: 2px;
    background: #e0e0e0;
  }

  .step-item {
    position: relative;
    margin-bottom: 25px;
    display: flex;
    align-items: flex-start;
  }

  .step-number {
    position: absolute;
    left: -40px;
    width: 30px;
    height: 30px;
    background-color: #e31e24; 
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    z-index: 1;
    box-shadow: 0 4px 10px rgba(227, 30, 36, 0.3);
  }

  .step-text {
    font-size: 18px;
    font-weight: 500;
    color: #444;
    padding-left: 10px;
  }

  .step-text strong {
    color: #007947;
  }

  /* ปุ่มจองคิวพร้อมลิงก์ใหม่ */
  .btn-booking {
    display: inline-flex;
    align-items: center;
    background-color: #007947;
    color: white;
    text-decoration: none;
    font-family: 'Kanit', sans-serif;
    font-size: 18px;
    font-weight: 600;
    padding: 15px 40px;
    border-radius: 50px;
    transition: all 0.3s ease;
    box-shadow: 0 10px 20px rgba(0, 121, 71, 0.2);
  }

  .btn-booking:hover {
    background-color: #005a35;
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(0, 121, 71, 0.3);
  }

  /* --- ฝั่งขวา: รูปอินโฟกราฟิก --- */
  .image-side {
    flex: 1.2;
    perspective: 1000px;
  }

  .infographic-card {
    background: white;
    padding: 10px;
    border-radius: 20px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.1);
    border: 1px solid #f0f0f0;
    transition: transform 0.5s ease;
  }

  .infographic-card:hover {
    transform: rotateY(-5deg) rotateX(2deg);
  }

  .infographic-card img {
    width: 100%;
    height: auto;
    border-radius: 12px;
    display: block;
  }

  @media (max-width: 950px) {
    .clinic-container { flex-direction: column; text-align: center; }
    .header-box { border-left: none; border-bottom: 4px solid #007947; padding: 0 0 15px 0; display: inline-block; }
    .steps-list { display: inline-block; text-align: left; padding-left: 45px; }
  }
</style>
</head>
<body>

  <div class="clinic-container">
    
    <div class="text-side">
      <div class="header-box">
        <h1 class="main-title">Risk Clinic</h1>
        <p class="sub-title">ติดขัดตรงไหน ปรึกษาเราได้</p>
      </div>
      
      <div class="steps-list">
        <div class="step-item">
          <div class="step-number">1</div>
          <div class="step-text"><strong>สแกนจองคิว:</strong> เลือกวันและเวลาที่ท่านสะดวก</div>
        </div>
        <div class="step-item">
          <div class="step-number">2</div>
          <div class="step-text"><strong>พูดคุย/วิเคราะห์:</strong> ปรึกษาเชิงลึกกับผู้เชี่ยวชาญ</div>
        </div>
        <div class="step-item">
          <div class="step-number">3</div>
          <div class="step-text"><strong>รับแนวทาง:</strong> ประเมินผลและจัดการอย่างมั่นใจ</div>
        </div>
      </div>

      <a href="https://forms.office.com/pages/responsepage.aspx?id=w9lFUAs7FUOFlGQRi710lfOhACsYT79Gpwp1kcjLz55UNkxROTc5V0VMMjVVQkhRQkdUSVk0NU0xQS4u&origin=lprLink&route=shorturl" target="_blank" class="btn-booking">
        จองคิวตรงนี้เลย
        <svg style="margin-left: 10px" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
      </a>
    </div>

    <div class="image-side">
      <div class="infographic-card">
        <img src="infographic-clinic.png" alt="Risk Management Clinic Details">
      </div>
    </div>

  </div>

</body>
</html>
